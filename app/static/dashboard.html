<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Wallet Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.5em;
        }

        .header-info {
            text-align: right;
        }

        .header-info p {
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: #667eea;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 40px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        input, button {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input {
            width: 100%;
            color: #333;
            background-color: #fff;
        }

        input::placeholder {
            color: #999;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            padding: 12px 24px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 15px;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e9ecef;
            color: #333;
            background-color: #fff;
        }

        td input {
            background-color: #fff;
            color: #333;
            width: 150px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85em;
        }

        .badge.success {
            background: #d4edda;
            color: #155724;
        }

        .badge.danger {
            background: #f8d7da;
            color: #721c24;
        }

        .amount {
            font-weight: 700;
            font-size: 1.1em;
        }

        .amount.positive {
            color: #28a745;
        }

        .amount.negative {
            color: #dc3545;
        }

        .balance-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>💰 Wallet Dashboard</h1>
            </div>
            <div class="header-info">
                <p id="userEmail">-</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="content">
            <!-- Wallet Section -->
            <div class="section">
                <h2>💼 Wallet</h2>
                <button onclick="getBalance()" style="width: auto;">Refresh Balance</button>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Account Email</th>
                                <th>Current Balance</th>
                                <th>Last Updated</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td id="walletEmail">-</td>
                                <td class="amount positive" id="balanceDisplay">₹ 0.00</td>
                                <td id="balanceUpdated">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Transactions Section -->
            <div class="section">
                <h2>💸 Transactions</h2>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Transaction Type</th>
                                <th>Amount (₹)</th>
                                <th>Action</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Credit (Add Money)</strong></td>
                                <td><input type="number" id="creditAmount" placeholder="0.00" step="0.01" min="0.01" value="1000"></td>
                                <td><button onclick="credit()" style="width: auto;">Credit</button></td>
                                <td id="creditStatus"></td>
                            </tr>
                            <tr>
                                <td><strong>Debit (Withdraw Money)</strong></td>
                                <td><input type="number" id="debitAmount" placeholder="0.00" step="0.01" min="0.01" value="100" style="width: 150px;"></td>
                                <td><button onclick="debit()" style="width: auto;">Debit</button></td>
                                <td id="debitStatus"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Transaction History Section -->
            <div class="section">
                <h2>📜 Transaction History</h2>
                <button onclick="getTransactions()" style="width: auto;">Refresh History</button>
                
                <div class="table-responsive">
                    <table id="transactionsTable">
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Type</th>
                                <th>Amount (₹)</th>
                                <th>Date & Time</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsListBody">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 20px; color: #666;">
                                    Loading transactions...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-detect API base URL for both local and production
        const API_BASE = window.location.origin + '/api/v1';
        let authToken = localStorage.getItem('authToken');
        let currentEmail = localStorage.getItem('currentEmail');

        // Check if logged in
        if (!authToken) {
            window.location.href = '/login.html';
        }

        // Set user email
        if (currentEmail) {
            document.getElementById('userEmail').textContent = currentEmail;
            document.getElementById('walletEmail').textContent = currentEmail;
        }

        // Load data on page load
        getBalance();
        getTransactions();

        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentEmail');
            window.location.href = '/login.html';
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            if (message) {
                const statusClass = type || 'info';
                element.innerHTML = `<span class="badge ${statusClass}">${message}</span>`;
                setTimeout(() => {
                    element.innerHTML = '';
                }, 5000);
            }
        }

        async function getBalance() {
            if (!authToken) return;

            try {
                const response = await fetch(`${API_BASE}/wallet`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                if (response.ok) {
                    document.getElementById('balanceDisplay').textContent = `₹ ${parseFloat(data.balance).toFixed(2)}`;
                    document.getElementById('balanceUpdated').textContent = new Date().toLocaleString();
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error('Error getting balance:', error);
            }
        }

        async function credit() {
            if (!authToken) {
                alert('Please login first');
                return;
            }

            const amount = document.getElementById('creditAmount').value;

            try {
                const response = await fetch(`${API_BASE}/transactions/credit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ amount: parseFloat(amount) })
                });

                const data = await response.json();
                if (response.ok) {
                    showStatus('creditStatus', `Success! New balance: ₹${data.new_balance}`, 'success');
                    getBalance();
                    getTransactions();
                } else {
                    showStatus('creditStatus', data.error || 'Credit failed', 'danger');
                    if (response.status === 401) {
                        logout();
                    }
                }
            } catch (error) {
                showStatus('creditStatus', 'Error: ' + error.message, 'danger');
            }
        }

        async function debit() {
            if (!authToken) {
                alert('Please login first');
                return;
            }

            const amount = document.getElementById('debitAmount').value;

            try {
                const response = await fetch(`${API_BASE}/transactions/debit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ amount: parseFloat(amount) })
                });

                const data = await response.json();
                if (response.ok) {
                    showStatus('debitStatus', `Success! New balance: ₹${data.new_balance}`, 'success');
                    getBalance();
                    getTransactions();
                } else {
                    showStatus('debitStatus', data.error || 'Debit failed', 'danger');
                    if (response.status === 401) {
                        logout();
                    }
                }
            } catch (error) {
                showStatus('debitStatus', 'Error: ' + error.message, 'danger');
            }
        }

        async function getTransactions() {
            if (!authToken) return;

            try {
                const response = await fetch(`${API_BASE}/transactions`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                if (response.ok) {
                    const tbody = document.getElementById('transactionsListBody');
                    if (data.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 20px; color: #666;">
                                    No transactions yet.
                                </td>
                            </tr>
                        `;
                    } else {
                        tbody.innerHTML = data.map(tx => {
                            const isCredit = tx.type === 'credit';
                            return `
                                <tr>
                                    <td style="font-family: monospace; font-size: 0.9em;">${tx.id.substring(0, 8)}...</td>
                                    <td><span class="badge ${isCredit ? 'success' : 'danger'}">${tx.type.toUpperCase()}</span></td>
                                    <td class="amount ${isCredit ? 'positive' : 'negative'}">${isCredit ? '+' : '-'}₹${parseFloat(tx.amount).toFixed(2)}</td>
                                    <td>${new Date(tx.created_at).toLocaleString()}</td>
                                </tr>
                            `;
                        }).join('');
                    }
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error('Error getting transactions:', error);
            }
        }
    </script>
</body>
</html>
